<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Music Bot — Pairing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 450px;
            width: 100%;
        }

        h1 { color: #333; text-align: center; margin-bottom: 10px; font-size: 26px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #25D366; }

        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .primary-btn { background: #25D366; color: white; }
        .primary-btn:hover:not(:disabled) { background: #128C7E; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        .hidden { display: none; }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info    { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }

        .logo { text-align: center; margin-bottom: 20px; font-size: 48px; }

        .pairing-code {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 4px;
            text-align: center;
            color: #128C7E;
            background: #f0fdf4;
            border: 2px dashed #25D366;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
        }

        .instructions {
            font-size: 13px;
            color: #555;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            line-height: 1.6;
        }
        .instructions ol { margin-left: 18px; margin-top: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎵</div>
        <h1>WhatsApp Music Bot</h1>
        <p class="subtitle">Link your bot account with a pairing code</p>

        <div id="connected-section" class="hidden">
            <div class="status success">✅ Bot is connected and online!</div>
        </div>

        <div id="request-section">
            <input type="tel" id="phoneNumber" placeholder="Phone number with country code (e.g. 14155552671)" required>
            <button class="primary-btn" id="requestBtn" onclick="requestCode()">Get Pairing Code</button>
        </div>

        <div id="code-section" class="hidden">
            <div class="pairing-code" id="pairingCode">----</div>
            <div class="instructions">
                <strong>To link this device:</strong>
                <ol>
                    <li>Open <strong>WhatsApp</strong> on your phone</li>
                    <li>Go to <strong>Settings → Linked Devices</strong></li>
                    <li>Tap <strong>Link a Device</strong></li>
                    <li>Tap <strong>"Link with phone number instead"</strong></li>
                    <li>Enter the code above</li>
                </ol>
            </div>
        </div>

        <div id="status"></div>
    </div>

    <script>
        async function requestCode() {
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const btn = document.getElementById('requestBtn');

            if (!phoneNumber) {
                showStatus('Please enter a phone number', 'error');
                return;
            }

            btn.disabled = true;
            showStatus('Requesting pairing code...', 'info');

            try {
                const response = await fetch('/api/phone-auth/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phoneNumber })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('request-section').classList.add('hidden');
                    document.getElementById('code-section').classList.remove('hidden');
                    document.getElementById('pairingCode').textContent = data.code;
                    showStatus('Code generated! Enter it in WhatsApp within 60 seconds.', 'success');
                } else {
                    showStatus(`Error: ${data.error}`, 'error');
                    btn.disabled = false;
                }
            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
                btn.disabled = false;
            }
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = message;
            statusDiv.className = 'status ' + type;
        }

        // Poll connection state so the page updates automatically once linked
        async function pollState() {
            try {
                const r = await fetch('/api/pairing-state');
                const d = await r.json();

                if (d.status === 'connected') {
                    document.getElementById('request-section').classList.add('hidden');
                    document.getElementById('code-section').classList.add('hidden');
                    document.getElementById('connected-section').classList.remove('hidden');
                    document.getElementById('status').innerHTML = '';
                } else if (d.status === 'code_ready' && d.code) {
                    document.getElementById('request-section').classList.add('hidden');
                    document.getElementById('code-section').classList.remove('hidden');
                    document.getElementById('pairingCode').textContent = d.code;
                }
            } catch (e) {}
            setTimeout(pollState, 3000);
        }

        document.getElementById('phoneNumber').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') requestCode();
        });

        pollState();
    </script>
</body>
</html>
